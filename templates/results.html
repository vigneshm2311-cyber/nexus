<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NEXUS — Results</title>
  <link rel="stylesheet" href="/static/style.css"/>
</head>
<body>
  <div class="container">

    <header>
      <div class="logo">⬡ NEXUS</div>
      <p class="tagline">Research complete</p>
    </header>

    <div id="results-root">
      <div class="dim" style="text-align:center;padding:2rem;">Loading results…</div>
    </div>

    <div class="actions">
      <a href="/" class="btn-secondary">← New Research</a>
      <a id="dl-md"   href="#" class="btn-secondary" style="display:none">⬇ Markdown</a>
      <a id="dl-json" href="#" class="btn-secondary" style="display:none">⬇ JSON</a>
    </div>

    <footer>NEXUS v3 · Ollama · Local</footer>

  </div>

  <script>
    const raw = sessionStorage.getItem("nexus_results");
    if (!raw) {
      document.getElementById("results-root").innerHTML =
        '<div class="alert">No results found. <a href="/">Run a new search.</a></div>';
    } else {
      const data = JSON.parse(raw);
      renderResults(data);
    }

    function scoreColor(score) {
      if (score >= 0.75) return "score-high";
      if (score >= 0.50) return "score-mid";
      return "score-low";
    }

    function escapeHtml(str) {
      const div = document.createElement("div");
      div.textContent = str || "";
      return div.innerHTML;
    }

    function renderPapers(papers) {
      if (!papers || papers.length === 0) {
        return '<div class="papers-empty">No supporting literature found.</div>';
      }

      const items = papers.map(p => {
        const title  = escapeHtml(p.title || "Untitled");
        const source = escapeHtml(p.source || "");
        if (p.url) {
          return `<li><a href="${p.url}" target="_blank" rel="noopener noreferrer">${title}</a> <span class="paper-source">(${source})</span></li>`;
        }
        return `<li>${title} <span class="paper-source">(${source})</span></li>`;
      }).join("");

      return `
        <details class="papers-disclosure">
          <summary>📄 Supporting literature (${papers.length} papers)</summary>
          <ul class="papers-list">${items}</ul>
        </details>`;
    }

    function renderAnalogies(analogies) {
      if (!analogies || !analogies.analogies || analogies.analogies.length === 0) {
        return "";
      }

      const mechanism = escapeHtml(analogies.mechanism || "");
      const cards = analogies.analogies.map(a => {
        const field    = escapeHtml(a.field || "");
        const analogy  = escapeHtml(a.analogy || "");
        const inspired  = escapeHtml(a.new_hypothesis || "");
        let papersHtml = "";
        if (a.papers && a.papers.length > 0) {
          const items = a.papers.map(p => `<li>${escapeHtml(p)}</li>`).join("");
          papersHtml = `<ul class="analogy-papers">${items}</ul>`;
        }
        return `
          <div class="analogy-card">
            <div class="analogy-field">${field}</div>
            <p class="analogy-text"><strong>Analogy:</strong> ${analogy}</p>
            <p class="analogy-text"><strong>Inspired hypothesis:</strong> ${inspired}</p>
            ${papersHtml}
          </div>`;
      }).join("");

      return `
        <section class="section-block">
          <h2 class="section-title">🔗 Analogies from Adjacent Fields</h2>
          ${mechanism ? `<p class="section-subtext"><strong>Core mechanism:</strong> ${mechanism}</p>` : ""}
          <div class="analogy-grid">${cards}</div>
        </section>`;
    }

    function renderGaps(gaps) {
      const gapList = (gaps && gaps.gaps) ? gaps.gaps : (Array.isArray(gaps) ? gaps : []);
      if (!gapList || gapList.length === 0) {
        return "";
      }

      const items = gapList.map((g, i) => {
        const priority = (g.priority || "medium").toUpperCase();
        const priorityClass = "gap-priority-" + (g.priority || "medium").toLowerCase();
        return `
          <div class="gap-card">
            <div class="gap-header">
              <span class="gap-num">Gap ${i + 1}</span>
              <span class="gap-priority ${priorityClass}">${priority}</span>
            </div>
            <p class="gap-question">${escapeHtml(g.gap || "")}</p>
            <p class="gap-detail"><strong>Why it matters:</strong> ${escapeHtml(g.why || "")}</p>
            <p class="gap-detail"><strong>Suggested approach:</strong> ${escapeHtml(g.approach || "")}</p>
          </div>`;
      }).join("");

      return `
        <section class="section-block">
          <h2 class="section-title">🧭 Research Gaps</h2>
          <div class="gap-grid">${items}</div>
        </section>`;
    }

    function renderResults(data) {
      const root = document.getElementById("results-root");
      let html = "";

      data.ranked.forEach((h, i) => {
        const sc    = typeof h.score === "number" ? h.score.toFixed(3) : h.score;
        const rank  = i + 1;
        const cls   = scoreColor(parseFloat(sc));

        html += `
        <div class="hyp-card">
          <div class="hyp-header">
            <span class="rank">#${rank}</span>
            <span class="score-badge ${cls}">${sc}</span>
          </div>
          <p class="hyp-text">${escapeHtml(h.hypothesis_text)}</p>
          <div class="metrics">
            <div class="metric">
              <span class="metric-label">Novelty</span>
              <span class="metric-bar"><span style="width:${(h.novelty||0)*100}%"></span></span>
              <span class="metric-val">${typeof h.novelty === "number" ? h.novelty.toFixed(2) : h.novelty}</span>
            </div>
            <div class="metric">
              <span class="metric-label">Evidence</span>
              <span class="metric-bar"><span style="width:${(h.evidence||0)*100}%"></span></span>
              <span class="metric-val">${typeof h.evidence === "number" ? h.evidence.toFixed(2) : h.evidence}</span>
            </div>
            <div class="metric">
              <span class="metric-label">Feasibility</span>
              <span class="metric-bar"><span style="width:${(h.feasibility||0)*100}%"></span></span>
              <span class="metric-val">${typeof h.feasibility === "number" ? h.feasibility.toFixed(2) : h.feasibility}</span>
            </div>
          </div>
          ${h.critique ? `<div class="critique">💬 ${escapeHtml(h.critique)}</div>` : ""}
          ${renderPapers(h.papers)}
        </div>`;
      });

      html += renderAnalogies(data.analogies);
      html += renderGaps(data.gaps);

      root.innerHTML = html;

      if (data.md_path) {
        const a = document.getElementById("dl-md");
        a.href = "/download?path=" + encodeURIComponent(data.md_path);
        a.style.display = "inline-block";
      }
      if (data.json_path) {
        const a = document.getElementById("dl-json");
        a.href = "/download?path=" + encodeURIComponent(data.json_path);
        a.style.display = "inline-block";
      }
    }
  </script>
</body>
</html>
